<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AWS Configuration Review Checklist</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.44.0/iconfont/tabler-icons.min.css">
<style>
  :root {
    --bg: #f5f5f3;
    --surface: #ffffff;
    --surface-2: #f0f0ee;
    --text: #1a1a18;
    --text-secondary: #5f5e5a;
    --text-muted: #8a8983;
    --border: #e2e1dc;
    --border-strong: #c9c8c1;
    --accent: #185fa5;
    --accent-bg: #e6f1fb;
    --accent-text: #0c447c;
    --success: #0f6e56;
    --success-bg: #e1f5ee;
    --success-text: #085041;
    --radius: 8px;
    --shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  [data-theme="dark"] {
    --bg: #17171a;
    --surface: #1f1f23;
    --surface-2: #26262b;
    --text: #eceae3;
    --text-secondary: #a8a7a1;
    --text-muted: #77766f;
    --border: #34343a;
    --border-strong: #46464d;
    --accent: #5da2e8;
    --accent-bg: #123452;
    --accent-text: #a9d2f6;
    --success: #4fc79b;
    --success-bg: #0d2a22;
    --success-text: #86dcbc;
    --shadow: 0 1px 2px rgba(0,0,0,0.3);
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.5;
    transition: background .2s, color .2s;
  }
  .wrap { max-width: 900px; margin: 0 auto; padding: 24px 20px 80px; }
  header {
    display: flex; justify-content: space-between; align-items: flex-start;
    gap: 16px; flex-wrap: wrap; margin-bottom: 20px;
  }
  h1 { font-size: 20px; font-weight: 600; margin: 0 0 4px; }
  .subtext { font-size: 13px; color: var(--text-secondary); }
  .theme-toggle {
    display: flex; align-items: center; gap: 6px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; padding: 4px; cursor: pointer;
  }
  .theme-toggle button {
    border: none; background: transparent; padding: 6px 10px;
    border-radius: 16px; font-size: 13px; color: var(--text-secondary);
    cursor: pointer; display: flex; align-items: center; gap: 4px;
  }
  .theme-toggle button.active { background: var(--accent-bg); color: var(--accent-text); font-weight: 600; }

  .stats-row { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 16px; box-shadow: var(--shadow); flex: 1; min-width: 120px;
  }
  .stat-label { font-size: 12px; color: var(--text-muted); }
  .stat-value { font-size: 22px; font-weight: 600; margin-top: 2px; }

  .progress-track {
    height: 8px; background: var(--surface-2); border-radius: 6px; overflow: hidden; margin-bottom: 20px;
  }
  .progress-fill { height: 100%; background: var(--success); width: 0%; transition: width .3s; }

  .controls { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
  input[type="text"], select {
    background: var(--surface); color: var(--text); border: 1px solid var(--border-strong);
    border-radius: var(--radius); padding: 9px 12px; font-size: 14px; outline: none;
  }
  input[type="text"] { flex: 1; min-width: 220px; }
  select { min-width: 150px; }
  button.action {
    background: var(--surface); color: var(--text); border: 1px solid var(--border-strong);
    border-radius: var(--radius); padding: 9px 14px; font-size: 14px; cursor: pointer;
    display: flex; align-items: center; gap: 6px;
  }
  button.action:hover { background: var(--surface-2); }

  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
  .chip {
    font-size: 12.5px; padding: 5px 12px; border-radius: 20px;
    border: 1px solid var(--border-strong); background: var(--surface);
    color: var(--text-secondary); cursor: pointer; white-space: nowrap;
  }
  .chip.active { background: var(--accent-bg); color: var(--accent-text); border-color: var(--accent); font-weight: 600; }

  .category-block { margin-bottom: 24px; }
  .category-title {
    font-size: 14px; font-weight: 600; color: var(--text-secondary);
    padding-bottom: 6px; margin-bottom: 8px; border-bottom: 1px solid var(--border);
    display: flex; justify-content: space-between;
  }
  .check-row {
    display: flex; gap: 12px; align-items: flex-start; padding: 10px 6px;
    border-bottom: 1px solid var(--border); border-radius: 6px;
  }
  .check-row:hover { background: var(--surface); }
  .check-row input[type="checkbox"] {
    margin-top: 3px; width: 17px; height: 17px; flex-shrink: 0; accent-color: var(--success);
  }
  .check-title { font-size: 14.5px; font-weight: 600; }
  .check-desc { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }
  .done .check-title, .done .check-desc { opacity: .5; text-decoration: line-through; }

  .empty-state { text-align: center; padding: 40px 20px; color: var(--text-muted); }

  @media (max-width: 480px) {
    .wrap { padding: 16px 14px 60px; }
    .stat-card { min-width: 100px; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div>
      <h1>AWS configuration review checklist</h1>
      <div class="subtext" id="visitline"></div>
    </div>
    <div class="theme-toggle" id="themeToggle">
      <button data-mode="light"><i class="ti ti-sun"></i>Light</button>
      <button data-mode="dark"><i class="ti ti-moon"></i>Dark</button>
      <button data-mode="auto"><i class="ti ti-device-desktop"></i>Auto</button>
    </div>
  </header>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-label">Progress</div>
      <div class="stat-value" id="pctValue">0%</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Checked</div>
      <div class="stat-value" id="ratioValue">0 / 0</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Categories</div>
      <div class="stat-value" id="catCount">0</div>
    </div>
  </div>

  <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>

  <div class="controls">
    <input type="text" id="search" placeholder="Search checks, e.g. encryption, public access, IAM">
    <select id="statusFilter">
      <option value="all">All items</option>
      <option value="open">Unchecked only</option>
      <option value="done">Checked only</option>
    </select>
    <button class="action" id="exportBtn"><i class="ti ti-download"></i>Export progress</button>
    <button class="action" id="importBtn"><i class="ti ti-upload"></i>Import progress</button>
    <button class="action" id="resetBtn"><i class="ti ti-refresh"></i>Reset</button>
  </div>

  <div class="chips" id="chips"></div>
  <div id="list"></div>
</div>

const STORAGE_KEY = 'aws_review_checked_v1';
const VISIT_KEY = 'aws_review_visits_v1';
const THEME_KEY = 'aws_review_theme_v1';

let checked = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
let activeCat = 'all';
const total = DATA.reduce((s, c) => s + c[1].length, 0);

let visits = parseInt(localStorage.getItem(VISIT_KEY) || '0', 10) + 1;
localStorage.setItem(VISIT_KEY, visits);
document.getElementById('visitline').textContent =
  'Visit #' + visits + ' on this browser \u00b7 ' + DATA.length + ' service categories \u00b7 progress saved locally';
document.getElementById('catCount').textContent = DATA.length;

function applyTheme(mode) {
  if (mode === 'auto') {
    document.documentElement.removeAttribute('data-theme');
    const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
    document.documentElement.setAttribute('data-theme', prefersDark ? 'dark' : 'light');
  } else {
    document.documentElement.setAttribute('data-theme', mode);
  }
  document.querySelectorAll('#themeToggle button').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === mode);
  });
  localStorage.setItem(THEME_KEY, mode);
}
document.getElementById('themeToggle').addEventListener('click', e => {
  const btn = e.target.closest('button');
  if (btn) applyTheme(btn.dataset.mode);
});
applyTheme(localStorage.getItem(THEME_KEY) || 'auto');
window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
  if ((localStorage.getItem(THEME_KEY) || 'auto') === 'auto') applyTheme('auto');
});

function key(ci, ii) { return ci + '-' + ii; }

function updateProgress() {
  const done = Object.values(checked).filter(Boolean).length;
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('pctValue').textContent = pct + '%';
  document.getElementById('ratioValue').textContent = done + ' / ' + total;
  document.getElementById('progressFill').style.width = pct + '%';
}

function renderChips() {
  const el = document.getElementById('chips');
  el.innerHTML = '';
  const allChip = document.createElement('button');
  allChip.className = 'chip' + (activeCat === 'all' ? ' active' : '');
  allChip.textContent = 'All services';
  allChip.onclick = () => { activeCat = 'all'; render(); };
  el.appendChild(allChip);
  DATA.forEach((cat, i) => {
    const chip = document.createElement('button');
    chip.className = 'chip' + (activeCat === i ? ' active' : '');
    chip.textContent = cat[0];
    chip.onclick = () => { activeCat = i; render(); };
    el.appendChild(chip);
  });
}

function render() {
  renderChips();
  const q = document.getElementById('search').value.trim().toLowerCase();
  const statusF = document.getElementById('statusFilter').value;
  const list = document.getElementById('list');
  list.innerHTML = '';
  DATA.forEach((cat, ci) => {
    if (activeCat !== 'all' && activeCat !== ci) return;
    const rows = [];
    cat[1].forEach((it, ii) => {
      const k = key(ci, ii);
      const isDone = !!checked[k];
      if (statusF === 'open' && isDone) return;
      if (statusF === 'done' && !isDone) return;
      const hay = (it[0] + ' ' + it[1] + ' ' + cat[0]).toLowerCase();
      if (q && !hay.includes(q)) return;
      rows.push([it, k, isDone]);
    });
    if (!rows.length) return;
    const wrap = document.createElement('div');
    wrap.className = 'category-block';
    const h = document.createElement('div');
    h.className = 'category-title';
    h.innerHTML = '<span>' + cat[0] + '</span><span>' + rows.length + '</span>';
    wrap.appendChild(h);
    rows.forEach(([it, k, isDone]) => {
      const row = document.createElement('label');
      row.className = 'check-row' + (isDone ? ' done' : '');
      const cb = document.createElement('input');
      cb.type = 'checkbox';
      cb.checked = isDone;
      cb.onchange = () => {
        checked[k] = cb.checked;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(checked));
        row.classList.toggle('done', cb.checked);
        updateProgress();
      };
      const textWrap = document.createElement('div');
      const tt = document.createElement('div');
      tt.className = 'check-title';
      tt.textContent = it[0];
      const dd = document.createElement('div');
      dd.className = 'check-desc';
      dd.textContent = it[1];
      textWrap.appendChild(tt);
      textWrap.appendChild(dd);
      row.appendChild(cb);
      row.appendChild(textWrap);
      wrap.appendChild(row);
    });
    list.appendChild(wrap);
  });
  if (!list.children.length) {
    const empty = document.createElement('div');
    empty.className = 'empty-state';
    empty.textContent = 'No checks match your filters.';
    list.appendChild(empty);
  }
  updateProgress();
}

document.getElementById('search').addEventListener('input', render);
document.getElementById('statusFilter').addEventListener('change', render);
document.getElementById('resetBtn').addEventListener('click', () => {
  if (confirm('Reset all checked progress?')) {
    checked = {};
    localStorage.setItem(STORAGE_KEY, '{}');
    render();
  }
});
document.getElementById('exportBtn').addEventListener('click', () => {
  const blob = new Blob([JSON.stringify(checked)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'aws-review-progress.json';
  a.click();
  URL.revokeObjectURL(url);
});
document.getElementById('importBtn').addEventListener('click', () => {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = 'application/json';
  input.onchange = () => {
    const file = input.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        checked = JSON.parse(reader.result);
        localStorage.setItem(STORAGE_KEY, JSON.stringify(checked));
        render();
      } catch (e) {
        alert('Invalid progress file.');
      }
    };
    reader.readAsText(file);
  };
  input.click();
});

render();
</script>
